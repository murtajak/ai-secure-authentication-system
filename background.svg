<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00ff9c" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#00d9ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7c4dff" stop-opacity="0.22"/>
    </linearGradient>

    <pattern id="p" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M0 30H60M30 0V60" stroke="#00ff9c" stroke-opacity="0.08" stroke-width="1"/>
      <path d="M0 0H60V60H0Z" fill="none" stroke="#00d9ff" stroke-opacity="0.04"/>
    </pattern>

    <filter id="blur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#070a0f"/>
  <rect width="1600" height="900" fill="url(#p)"/>
  <g opacity="0.8">
    <circle cx="280" cy="200" r="220" fill="url(#g)" filter="url(#blur)"/>
    <circle cx="1280" cy="260" r="260" fill="url(#g)" filter="url(#blur)"/>
    <circle cx="820" cy="760" r="280" fill="url(#g)" filter="url(#blur)"/>
  </g>

  <!-- Circuit-ish lines -->
  <g stroke="#00ff9c" stroke-opacity="0.18" stroke-width="2" fill="none">
    <path d="M120 780H420V620H600V520H820" />
    <path d="M1480 120H1120V240H980V360H760" />
    <path d="M220 140H520V220H720V300H980" />
  </g>
  <g fill="#00d9ff" fill-opacity="0.25">
    <circle cx="420" cy="620" r="6"/>
    <circle cx="600" cy="520" r="6"/>
    <circle cx="1120" cy="240" r="6"/>
    <circle cx="980" cy="360" r="6"/>
    <circle cx="520" cy="220" r="6"/>
    <circle cx="720" cy="300" r="6"/>
  </g>
</svg>


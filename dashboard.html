<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Admin Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Dashboard Styles */
        .dashboard-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-left: 5px solid;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card.blue { border-color: #54a0ff; }
        .stat-card.red { border-color: #ff6b6b; }
        .stat-card.purple { border-color: #9b59b6; }
        .stat-card.green { border-color: #1dd1a1; }
        .stat-card.yellow { border-color: #feca57; }
        .stat-card.orange { border-color: #ff9f43; }

        .stat-title { font-size: 0.9rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 2.5rem; font-weight: 800; margin-top: 10px; color: #333; }
        .stat-icon { float: right; font-size: 2rem; opacity: 0.2; }

        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chart-wrapper {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .chart-header {
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        @media (max-width: 768px) {
            .charts-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Reuse Background -->
    <div class="background-container">
        <div class="color-overlay" style="opacity: 0.8; background: #f4f6f9;"></div>
    </div>

    <div class="dashboard-container">
        <!-- Header -->
        <div class="colorful-header" style="margin-bottom: 30px;">
            <div class="rainbow-title">
                <h1><i class="fas fa-chart-line"></i> SECURITY ANALYTICS</h1>
                <div class="color-strip"></div>
            </div>
            <p style="text-align: center; color: #666;">Real-time Threat Intelligence Monitor</p>
        </div>

        <!-- 1. Key Metrics -->
        <div class="stats-grid">
            <div class="stat-card blue">
                <i class="fas fa-users stat-icon"></i>
                <div class="stat-title">Total Attempts</div>
                <div class="stat-value" id="total-val">0</div>
            </div>
            <div class="stat-card red">
                <i class="fas fa-database stat-icon"></i>
                <div class="stat-title">Blocked by Redis</div>
                <div class="stat-value" id="redis-val">0</div>
            </div>
            <div class="stat-card purple">
                <i class="fas fa-robot stat-icon"></i>
                <div class="stat-title">Blocked by AI</div>
                <div class="stat-value" id="ai-val">0</div>
            </div>
            <div class="stat-card green">
                <i class="fas fa-check-circle stat-icon"></i>
                <div class="stat-title">Successful Users</div>
                <div class="stat-value" id="success-val">0</div>
            </div>
            <div class="stat-card yellow">
                <i class="fas fa-envelope stat-icon"></i>
                <div class="stat-title">Emails Checked</div>
                <div class="stat-value" id="emails-checked-val">0</div>
            </div>
            <div class="stat-card orange">
                <i class="fas fa-envelope-open-text stat-icon"></i>
                <div class="stat-title">Emails Breached</div>
                <div class="stat-value" id="emails-breached-val">0</div>
            </div>
        </div>

        <!-- 2. Charts -->
        <div class="charts-container">
            <!-- Pie Chart: Threat Distribution -->
            <div class="chart-wrapper">
                <div class="chart-header"><i class="fas fa-shield-alt"></i> Threat Distribution Layer</div>
                <canvas id="layerChart"></canvas>
            </div>

            <!-- Bar Chart: Top Breaches -->
            <div class="chart-wrapper">
                <div class="chart-header"><i class="fas fa-list-ol"></i> Top Detected Breaches</div>
                <canvas id="breachChart"></canvas>
            </div>

            <!-- Email Breach Chart -->
            <div class="chart-wrapper">
                <div class="chart-header"><i class="fas fa-at"></i> Top Email Breaches Detected</div>
                <canvas id="emailBreachChart"></canvas>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="index.html" class="rainbow-button" style="text-decoration: none; display: inline-block;">
                <span class="button-text"><i class="fas fa-arrow-left"></i> BACK TO SIGNUP</span>
            </a>
        </div>
    </div>

    <!-- Dashboard Logic -->
    <script src="dashboard.js"></script>
</body>
</html>
